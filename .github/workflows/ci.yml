name: CI

on:
  push:
    branches:
      - "**"

jobs:
  # ── Test + type-check (every push, every branch) ─────────────────────────────
  test:
    name: Test & Type-check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: worker/package-lock.json

      - name: Install dependencies
        working-directory: worker
        run: npm ci

      - name: Run tests
        working-directory: worker
        run: npm test

      - name: Type-check (tsc --noEmit)
        working-directory: worker
        # wrangler ships its own tsc wrapper; calling tsc directly keeps this
        # step independent of wrangler internals.
        run: npx tsc --noEmit

  # ── Deploy to production (main only) ─────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: test
    # Only run when the push is to the default/main branch.
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: worker/package-lock.json

      - name: Install dependencies
        working-directory: worker
        run: npm ci

      # cloudflare/wrangler-action@v3.14.1 — pinned to latest tag as of 2026-04-14.
      # Intentionally NOT passing `--env dev`; this deploys to the prod environment
      # defined by the root-level routes in wrangler.toml.
      - name: Deploy via Wrangler
        uses: cloudflare/wrangler-action@v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker
          # wrangler deploy with no --env flag targets the production configuration
          # in wrangler.toml (the [[ routes ]] blocks, not [env.dev]).
          command: deploy
