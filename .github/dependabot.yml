version: 2

updates:
  # npm dependencies for the Cloudflare Worker
  - package-ecosystem: "npm"
    directory: "/worker"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "⬆️"
    groups:
      # Batch minor and patch bumps into a single PR to reduce noise
      minor:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions workflow dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "⬆️"
    groups:
      github-actions:
        patterns:
          - "*"
